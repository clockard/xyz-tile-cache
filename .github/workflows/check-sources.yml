name: Source Availability Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'  # every Monday at 08:00 UTC

jobs:
  check-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Check tile source availability
        run: mvn --no-transfer-progress test -Pcheck-sources
