name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.11.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          # A PAT is required if main has branch protection rules.
          # Create a token with repo scope, store it as GH_PAT, and replace
          # secrets.GITHUB_TOKEN below with secrets.GH_PAT.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: mvn --no-transfer-progress versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Build and test
        run: mvn --no-transfer-progress clean verify

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          build-args: VERSION=${{ inputs.version }}
          tags: xyz-tile-cache:scan

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: xyz-tile-cache:scan
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ inputs.version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xyz-tile-cache:${{ inputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/xyz-tile-cache:latest

      - name: Commit release version and create tag
        run: |
          git add pom.xml
          git commit -m "Release ${{ inputs.version }}"
          git tag v${{ inputs.version }}

      - name: Compute next snapshot version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ inputs.version }}"
          echo "version=${major}.${minor}.$((patch + 1))-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Set next snapshot version
        run: mvn --no-transfer-progress versions:set -DnewVersion=${{ steps.next.outputs.version }} -DgenerateBackupPoms=false

      - name: Commit next snapshot version
        run: |
          git add pom.xml
          git commit -m "Prepare ${{ steps.next.outputs.version }}"

      - name: Push commits and tag
        run: |
          git push origin main
          git push origin v${{ inputs.version }}
