<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XYZ Tile Cache</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10/ol.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toolbar">
    <span class="title">XYZ Tile Cache</span>
    <div class="toolbar-controls">
      <label for="layer-select">Layer</label>
      <select id="layer-select"></select>
      <button id="draw-btn">Draw Preload</button>
      <button id="downloads-btn">Downloads</button>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>

    <div id="zoom-indicator">Z 2.0</div>
    <div id="attribution"></div>

    <div id="downloads-panel">
      <div class="panel-header">
        <h3>Preloads</h3>
        <button id="close-downloads" aria-label="Close">&times;</button>
      </div>
      <ul id="downloads-list">
        <li class="empty-state">No preloads yet</li>
      </ul>
    </div>
  </div>

  <div id="preload-overlay" class="hidden">
    <div id="preload-modal">
      <h3>Preload Tiles</h3>
      <div class="form-row">
        <label>Bounding Box</label>
        <div id="bbox-display"></div>
      </div>
      <div class="form-row">
        <label for="preload-name-input">Name</label>
        <input type="text" id="preload-name-input" placeholder="e.g. Colorado Springs">
      </div>
      <div class="form-row">
        <label for="zoom-slider">Max Zoom: <span id="zoom-value">15</span></label>
        <input type="range" id="zoom-slider" min="1" max="15" value="15">
      </div>
      <div class="form-row">
        <label>Layers</label>
        <div id="preload-layers"></div>
      </div>
      <div class="form-row hidden" id="preload-warning-row">
        <div id="preload-warning">
          Some tile sources may apply rate limits or usage restrictions that can prevent downloads of large areas.
        </div>
      </div>
      <div class="form-row">
        <label for="admin-key-input">Admin Key</label>
        <input type="password" id="admin-key-input" placeholder="X-Admin-Key value" autocomplete="current-password">
      </div>
      <div class="modal-buttons">
        <button id="submit-preload">Start Download</button>
        <button id="cancel-preload" class="secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ol@10/dist/ol.js"></script>
  <script src="app.js"></script>
</body>
</html>
