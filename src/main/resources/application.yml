server:
  port: 8383

spring:
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  security:
    oauth2:
      resourceserver:
        jwt:
          # Set KEYCLOAK_ISSUER_URI when running in xyz.auth.mode=jwt; leave empty for token mode.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:}

xyz:
  auth:
    mode: jwt                   # jwt | token. token = single static admin token (no Keycloak)
    adminToken: ""              # used when mode=token; presented as Authorization: Bearer <token>
    clientId: xyz-tile-cache    # OAuth2 client id reported to the UI (jwt mode)
  baseTileDirectory: "/tmp/tiles"
  minFreeDiskBytes: 1073741824  # Stop caching tiles when free disk space drops below this (default 1 GB)
  offline: false
  tileTimeoutSeconds: 5
  layerSyncSeconds: 10          # How often to check for layer changes from other instances (seconds)
  uiEnabled: true               # Set to false to disable the web UI (all UI paths return 404)
  adminRole: admin              # Keycloak realm role required for write operations
  layers:
    # Each layer requires an "id" (used in tile URLs/API paths) and a "name" (shown in the UI).
    # For backward compatibility, if "id" is omitted the value of "name" is used as the id.

    # WMTS RESTful style
    - id: "topo"
      name: "USGS Topo (ArcGIS)"
      sourceType: WMTS_REST
      urlTemplate: "https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/WMTS/tile/1.0.0/USGSTopo/default/GoogleMapsCompatible/{TileMatrix}/{TileRow}/{TileCol}"

    # WMTS KVP (query-parameter) style
    - id: "imagery-wmts"
      name: "World Imagery (WMTS)"
      sourceType: WMTS_KVP
      urlTemplate: "https://services.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/WMTS"
      wmtsLayerName: "World_Imagery"
      wmtsTileMatrixSet: "EPSG:3857"
      wmtsStyle: "default"
      wmtsFormat: "image/png"

    # ─── XYZ: Streets & General ────────────────────────────────────────────────

    - id: "osm"
      name: "OpenStreetMap"
      sourceType: XYZ
      maxZoom: 19
      attribution: "© OpenStreetMap contributors"
      urlTemplate: "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
      headers:
        Referer: "https://www.openstreetmap.org/"
      # Heavy usage requires compliance with OSM tile policy:
      # https://operations.osmfoundation.org/policies/tiles/

    - id: "osm-us"
      name: "OpenStreetMap (US)"
      urlTemplate: "https://osmap.a.tile.mapcdn.net/en/map/v1/{z}/{x}/{y}.png"
      attribution: "© OpenStreetMap contributors"
      maxZoom: 19
      headers:
        Referer: "https://www.osmap.us/"

    - id: "carto-light"
      name: "Carto Light"
      sourceType: XYZ
      maxZoom: 20
      attribution: "© OpenStreetMap contributors © CARTO"
      urlTemplate: "https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png"

    - id: "carto-dark"
      name: "Carto Dark"
      sourceType: XYZ
      maxZoom: 20
      attribution: "© OpenStreetMap contributors © CARTO"
      urlTemplate: "https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png"

    - id: "carto-voyager"
      name: "Carto Voyager"
      sourceType: XYZ
      maxZoom: 20
      attribution: "© OpenStreetMap contributors © CARTO"
      urlTemplate: "https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png"

    # ─── XYZ: Satellite / Aerial ───────────────────────────────────────────────

    - id: "esri-satellite"
      name: "ESRI World Imagery"
      sourceType: XYZ
      maxZoom: 19
      # Zoom 20-22 exists in limited high-resolution areas but returns blank
      # tiles most of the globe, so 19 is the safe practical maximum.
      attribution: "Tiles © Esri — Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community"
      urlTemplate: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"

    - id: "esri-satellite-labels"
      name: "ESRI World Imagery Labels"
      sourceType: XYZ
      maxZoom: 19
      attribution: "Tiles © Esri — Esri, HERE, Garmin, © OpenStreetMap contributors, and the GIS user community"
      urlTemplate: "https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}"
      # Labels-only overlay — layer on top of esri-satellite.

    # ─── XYZ: Topo & Terrain ───────────────────────────────────────────────────

    - id: "opentopomap"
      name: "OpenTopoMap"
      sourceType: XYZ
      maxZoom: 17
      # Tiles at z16-17 exist but can be unreliable in sparse coverage areas.
      # z15 is the safest cap for preloading.
      attribution: "© OpenStreetMap contributors, SRTM | Map style: © OpenTopoMap (CC-BY-SA)"
      urlTemplate: "https://tile.opentopomap.org/{z}/{x}/{y}.png"

    - id: "esri-topo"
      name: "ESRI World Topo"
      sourceType: XYZ
      maxZoom: 19
      attribution: "Tiles © Esri — Esri, HERE, Garmin, Intermap, increment P Corp., GEBCO, USGS, FAO, NPS, NRCAN, GeoBase, IGN, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community"
      urlTemplate: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"

    - id: "esri-natgeo"
      name: "ESRI National Geographic"
      sourceType: XYZ
      maxZoom: 16
      attribution: "Tiles © Esri — National Geographic, Esri, HERE, Garmin, Intermap, INCREMENTP, NRCan, Esri Japan, METI, Esri China (Hong Kong), Esri Korea, Esri (Thailand), NGCC, © OpenStreetMap contributors, and the GIS User Community"
      urlTemplate: "https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}"

    - id: "esri-relief"
      name: "ESRI Shaded Relief"
      sourceType: XYZ
      maxZoom: 13
      attribution: "Tiles © Esri — Source: Esri"
      urlTemplate: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}"
      # Hillshade only — good as a base layer under vector overlays.

    - id: "esri-physical"
      name: "ESRI Physical Map"
      sourceType: XYZ
      maxZoom: 8
      attribution: "Tiles © Esri — Source: US National Park Service"
      urlTemplate: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}"
      # Small-scale overview only — no detail beyond continental level.

    # ─── XYZ: Ocean & Nautical ─────────────────────────────────────────────────

    - id: "esri-ocean"
      name: "ESRI Ocean Base"
      sourceType: XYZ
      maxZoom: 13
      attribution: "Tiles © Esri — Sources: GEBCO, NOAA, CHS, OSU, UNH, CSUMB, National Geographic, DeLorme, NAVTEQ, and Esri"
      urlTemplate: "https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}"

    - id: "esri-ocean-reference"
      name: "ESRI Ocean Reference"
      sourceType: XYZ
      maxZoom: 13
      attribution: "Tiles © Esri — Sources: Esri, HERE, Garmin, Intermap, increment P Corp., GEBCO, USGS, FAO, NPS, NRCAN, GeoBase, IGN, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community"
      urlTemplate: "https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}"
      # Labels/place-name overlay — layer on top of esri-ocean.

    # ─── WMTS REST: USGS National Map (US coverage only) ───────────────────────

    - id: "usgs-topo"
      name: "USGS Topo"
      sourceType: WMTS_REST
      maxZoom: 17
      attribution: "USGS The National Map: National Boundaries Dataset, 3DEP Elevation Program, Geographic Names Information System, National Hydrography Dataset, National Land Cover Database, National Structures Dataset, and National Transportation Dataset"
      urlTemplate: "https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/WMTS/tile/1.0.0/USGSTopo/default/GoogleMapsCompatible/{TileMatrix}/{TileRow}/{TileCol}"

    - id: "usgs-imagery"
      name: "USGS Imagery"
      sourceType: WMTS_REST
      maxZoom: 16
      attribution: "USGS The National Map: Orthoimagery. Data refreshed annually."
      urlTemplate: "https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/WMTS/tile/1.0.0/USGSImageryOnly/default/GoogleMapsCompatible/{TileMatrix}/{TileRow}/{TileCol}"

    - id: "usgs-imagery-topo"
      name: "USGS Imagery + Topo"
      sourceType: WMTS_REST
      maxZoom: 17
      attribution: "USGS The National Map: Orthoimagery and US Topo"
      urlTemplate: "https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryTopo/MapServer/WMTS/tile/1.0.0/USGSImageryTopo/default/GoogleMapsCompatible/{TileMatrix}/{TileRow}/{TileCol}"

    - id: "usgs-hydro"
      name: "USGS Hydro"
      sourceType: WMTS_REST
      maxZoom: 16
      attribution: "USGS The National Map: National Hydrography Dataset"
      urlTemplate: "https://basemap.nationalmap.gov/arcgis/rest/services/USGSHydroCached/MapServer/WMTS/tile/1.0.0/USGSHydroCached/default/GoogleMapsCompatible/{TileMatrix}/{TileRow}/{TileCol}"

    - id: "usgs-shaded-relief"
      name: "USGS Shaded Relief"
      sourceType: WMTS_REST
      maxZoom: 13
      attribution: "USGS The National Map: 3DEP Elevation Program"
      urlTemplate: "https://basemap.nationalmap.gov/arcgis/rest/services/USGSShadedReliefOnly/MapServer/WMTS/tile/1.0.0/USGSShadedReliefOnly/default/GoogleMapsCompatible/{TileMatrix}/{TileRow}/{TileCol}"

    # ─── WMTS KVP: NASA GIBS (global Earth observation) ───────────────────────
    # All NASA GIBS layers are public domain — no attribution legally required
    # but crediting NASA/GIBS is strongly encouraged per their data use policy.

    - id: "nasa-blue-marble"
      name: "NASA Blue Marble"
      sourceType: WMTS_KVP
      maxZoom: 8
      attribution: "Imagery provided by NASA GIBS (EOSDIS)"
      urlTemplate: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/wmts.cgi"
      wmtsLayerName: "BlueMarble_NextGeneration"
      wmtsTileMatrixSet: "GoogleMapsCompatible_Level8"
      wmtsStyle: "default"
      wmtsFormat: "image/jpeg"

    - id: "nasa-terra-truecolor"
      name: "NASA Terra True Color"
      sourceType: WMTS_KVP
      maxZoom: 9
      attribution: "Imagery provided by NASA GIBS (EOSDIS) — MODIS/Terra"
      urlTemplate: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/wmts.cgi"
      wmtsLayerName: "MODIS_Terra_CorrectedReflectance_TrueColor"
      wmtsTileMatrixSet: "GoogleMapsCompatible_Level9"
      wmtsStyle: "default"
      wmtsFormat: "image/jpeg"
      wmtsTime: true
      timeFormat: "yyyy-MM-dd"
      tileExpirationMinutes: 1440

    - id: "nasa-land-surface-temp"
      name: "NASA Land Surface Temp"
      sourceType: WMTS_KVP
      maxZoom: 7
      attribution: "Imagery provided by NASA GIBS (EOSDIS) — MODIS/Terra"
      urlTemplate: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/wmts.cgi"
      wmtsLayerName: "MODIS_Terra_Land_Surface_Temp_Day"
      wmtsTileMatrixSet: "GoogleMapsCompatible_Level7"
      wmtsStyle: "default"
      wmtsFormat: "image/png"
      wmtsTime: true
      timeFormat: "yyyy-MM-dd"
      tileExpirationMinutes: 1440

    - id: "nasa-snow-ice"
      name: "NASA Snow & Ice Cover"
      sourceType: WMTS_KVP
      maxZoom: 8
      attribution: "Imagery provided by NASA GIBS (EOSDIS) — MODIS/Terra"
      urlTemplate: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/wmts.cgi"
      wmtsLayerName: "MODIS_Terra_NDSI_Snow_Cover"
      wmtsTileMatrixSet: "GoogleMapsCompatible_Level8"
      wmtsStyle: "default"
      wmtsFormat: "image/png"
      wmtsTime: true
      timeFormat: "yyyy-MM-dd"
      tileExpirationMinutes: 1440

    # ─── Weather ───────────────────────────────────────────────────────────────
    - id: "iem-nexrad-radar"
      name: "IEM NEXRAD Radar"
      sourceType: XYZ
      maxZoom: 8
      attribution: "Iowa State University Environmental Mesonet / NOAA NWS"
      urlTemplate: "https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png"
      tileExpirationMinutes: 5

    - id: "accu-weather"
      name: "AccuWeather Radar"
      sourceType: XYZ
      maxZoom: 7
      attribution: "© AccuWeather"
      urlTemplate: "https://api.accuweather.com/maps/v1/radar/globalSIR/zxy/{time}/{z}/{x}/{y}.png?apikey=de13920f574d420984d3080b1fa6132b"
      tileExpirationMinutes: 5
      timeFormat: "yyyy-MM-dd'T'HH:mm:ss'Z'"
      headers:
        Referer: "https://www.accuweather.com"

  vector:
    bundledPath: "${xyz.baseTileDirectory}/vector/world_z0-7.pmtiles"
    downloadDirectory: "${xyz.baseTileDirectory}/vector"
    # {date} is replaced with today's date (YYYYMMDD) at download time.
    sourceUrl: "${PMTILES_SOURCE_URL:https://build.protomaps.com/{date}.pmtiles}"
    maxDownloadZoom: 15
    enabled: true

